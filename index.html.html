<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Do you love me? 💖</title>
<style>
  body {
    text-align: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    overflow: hidden;
    height: 100vh;
  }

  h1 {
    margin-top: 80px;
    font-size: 3em;
    color: white;
  }

  button {
    padding: 14px 28px;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    position: absolute;
    transition: 0.2s;
  }

  #yes {
    position: static;
    background-color: #28a745;
    color: white;
  }

  #no {
    background-color: #dc3545;
    color: white;
  }

  .heart {
    position: fixed;
    font-size: 24px;
    animation: float 3s linear infinite;
  }

  @keyframes float {
    0% {transform: translateY(0);}
    100% {transform: translateY(-100vh);}
  }
</style>
</head>
<body>

<h1 id="question">Do you love me? ❤️</h1>

<button id="yes">Yes 💖</button>
<button id="no">No 😢</button>

<script>
let noBtn = document.getElementById("no");
let yesBtn = document.getElementById("yes");
let question = document.getElementById("question");

let scale = 1;
let tries = 0;

const messages = [
  "Are you sure? 😢",
  "Think again! 😭",
  "Don't break my heart 💔",
  "Last chance! 😩",
  "Please... 🥺"
];

noBtn.addEventListener("mouseover", () => {
  tries++;

  // Move button randomly
  const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
  const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  // Shrink NO button
  scale -= 0.12;
  if (scale > 0) {
    noBtn.style.transform = `scale(${scale})`;
  }

  // Grow YES button
  yesBtn.style.transform = `scale(${1 + (1-scale)})`;

  // Change question text
  if (tries <= messages.length) {
    question.innerText = messages[tries - 1];
  }

  // After many tries → force YES
  if (tries > 5) {
    noBtn.style.display = "none";
    question.innerText = "You have no choice now 😏";
  }
});

yesBtn.addEventListener("click", () => {
  question.innerText = "I knew it! 😍💞";

  // Hearts explosion
  for (let i = 0; i < 50; i++) {
    let heart = document.createElement("div");
    heart.innerHTML = "💖";
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.top = "100vh";
    heart.style.fontSize = (Math.random() * 25 + 20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
  }
});
</script>

</body>
</html>
